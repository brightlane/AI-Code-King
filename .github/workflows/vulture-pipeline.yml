- name: Generate the sitemap
        uses: cicirello/generate-sitemap@v1
        with:
          base-url-path: https://brightlane.github.io/AI-Code-King/
          path-to-root: .
          include-html: true
          drop-html-extension: false
          date-only: true

      - name: Ping Google & Bing (IndexNow)
        run: |
          curl -X GET "http://www.google.com/ping?sitemap=https://brightlane.github.io/AI-Code-King/sitemap.xml"
          # For Bing/DuckDuckGo/Yandex
          curl -X POST "https://www.bing.com/indexnow?url=https://brightlane.github.io/AI-Code-King/sitemap.xml&key=${{ secrets.INDEXNOW_KEY }}"
