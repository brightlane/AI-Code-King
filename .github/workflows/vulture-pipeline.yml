name: Vulture 10K Automated Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # CRITICAL: Gives the bot permission to save pages
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necessary for rebase logic

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Scrapers & Generator
        run: |
          node rss.js
          node generator.js

      - name: Sync and Push
        run: |
          git config --global user.name "Vulture-Bot"
          git config --global user.email "vulture@ai-code-king.com"
          
          # Stage the new content first
          git add archives/ rss_data.json
          
          # Pull changes with autostash to avoid "dirty tree" errors
          git pull origin main --rebase --autostash
          
          git commit -m "Vulture Build: Successful Matrix Generation" || echo "No changes to commit"
          git push origin main
