name: Vulture 10K Automated Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *' # Every night at 2 AM

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Scrapers & Generator
        run: |
          node rss.js
          node generator.js

      - name: Sync and Push
        run: |
          git config --global user.name "Vulture-Bot"
          git config --global user.email "vulture@ai-code-king.com"
          git pull origin main --rebase
          git add archives/ rss_data.json
          git commit -m "Vulture Build: Added 100+ Matrix Pages" || echo "No changes"
          git push origin main
